---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Sidecar deployment - with nginx reverse proxy for external Route access

# Use base and override deployment
bases:
- ../base

namespace: openclaw

# Common labels applied to all resources
labels:
- pairs:
    deployment-variant: sidecar
  includeSelectors: false

# Common annotations
commonAnnotations:
  deployment-variant: "sidecar"
  description: "OpenClaw with nginx reverse proxy sidecar"

# Patches to replace deployment
patchesStrategicMerge:
- |-
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: openclaw
    namespace: openclaw
  spec:
    template:
      spec:
        containers:
        # Keep OpenClaw container (first container)
        - name: openclaw
          # Mount openclaw.json config file for CORS configuration
          volumeMounts:
          - name: openclaw-app-config
            mountPath: /home/node/.openclaw
            readOnly: true
        # Add nginx sidecar (second container)
        - name: nginx-proxy
          image: nginxinc/nginx-unprivileged:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
          - name: gateway
            containerPort: 8080
            protocol: TCP
          volumeMounts:
          - name: nginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true
          - name: nginx-cache
            mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            # OpenShift will assign UID automatically (do not set runAsUser)
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          startupProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
        volumes:
        - name: openclaw-app-config
          configMap:
            name: openclaw-app-config
            items:
            - key: openclaw.json
              path: openclaw.json
        - name: nginx-config
          configMap:
            name: nginx-proxy-config
            items:
            - key: nginx.conf
              path: nginx.conf
        - name: nginx-cache
          emptyDir: {}

# Patch service to point to nginx port
- |-
  apiVersion: v1
  kind: Service
  metadata:
    name: openclaw
    namespace: openclaw
  spec:
    ports:
    - name: gateway
      port: 18789
      targetPort: 8080
      protocol: TCP

# ConfigMap generator for nginx config
configMapGenerator:
- name: nginx-proxy-config
  namespace: openclaw
  files:
  - nginx.conf

# Images
images:
- name: ghcr.io/openclaw/openclaw
  newTag: "2026.3.7"
- name: nginxinc/nginx-unprivileged
  newTag: "1.25-alpine"
