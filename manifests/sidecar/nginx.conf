# Nginx configuration for OpenClaw reverse proxy sidecar
# Proxies external traffic (0.0.0.0:8080) to OpenClaw localhost (127.0.0.1:18789)

# Run as unprivileged user (OpenShift compatible)
user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /dev/stdout combined;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Temp paths (writable by non-root)
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream - OpenClaw on localhost
    upstream openclaw {
        server 127.0.0.1:18789;
        keepalive 32;
    }

    # HTTP server
    server {
        # Listen on 8080 (unprivileged port) on all interfaces
        listen 8080 default_server;
        listen [::]:8080 default_server;

        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Root location - proxy to OpenClaw
        location / {
            # Proxy settings
            proxy_pass http://openclaw;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts (important for WebSocket)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;

            # Keep-alive
            proxy_set_header Connection "";
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
