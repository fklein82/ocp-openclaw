---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: ai-agent
  annotations:
    description: "External access to OpenClaw Gateway"
    haproxy.router.openshift.io/timeout: "300s"
    haproxy.router.openshift.io/balance: "source"
spec:
  # Host will be auto-generated by OpenShift if not specified
  # Override in production with custom domain
  # host: openclaw.apps.example.com

  to:
    kind: Service
    name: openclaw
    weight: 100

  port:
    targetPort: gateway

  # TLS configuration - edge termination (recommended)
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

  wildcardPolicy: None
