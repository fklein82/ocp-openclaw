---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openclaw

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: openclaw

# Resources to deploy
resources:
- namespace.yaml
- serviceaccount.yaml
- scc.yaml
- rbac.yaml
- configmap.yaml
- openclaw-app-config.yaml
- secret.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- route.yaml

# Images - can be overridden in overlays
images:
- name: ghcr.io/openclaw/openclaw
  newTag: "2026.3.7"
