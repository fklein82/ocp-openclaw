---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: ai-agent
  annotations:
    description: "API keys and sensitive configuration for OpenClaw"
type: Opaque
stringData:
  # Gateway authentication token
  # IMPORTANT: Change this in production - use scripts/create-secrets.sh
  OPENCLAW_GATEWAY_TOKEN: "CHANGE_ME_IN_PRODUCTION"

  # AI Provider API Keys (uncomment and set as needed)
  # ANTHROPIC_API_KEY: "sk-ant-XXXXX"
  # OPENAI_API_KEY: "sk-XXXXX"
  # OPENROUTER_API_KEY: "sk-or-XXXXX"
  # GOOGLE_API_KEY: "XXXXX"
